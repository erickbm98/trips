            onChange={e=>setActForm({...actForm,location:e.target.value})}
          />
          {actForm.location&&(
            <button
              style={{marginTop:8,padding:"8px 14px",borderRadius:10,border:"none",background:"#1C4532",color:"#4ADE80",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}
              onClick={()=>window.open(mapsUrl(actForm.location),"_blank")}
            >🗺 Previsualizar en Google Maps</button>
          )}
        </div>
        <div style={S.fg}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <label style={{...S.lbl,marginBottom:0}}>📸 Fotos {formImages.length>0&&<span style={{color:tc.color,fontWeight:700}}>({formImages.length})</span>}</label>
            <label style={{padding:"6px 14px",borderRadius:10,background:tc.color+"22",border:`1.5px solid ${tc.color}44`,color:tc.color,fontSize:12,fontWeight:700,cursor:"pointer"}}>
              + Añadir foto
              <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFormImageUpload}/>
            </label>
          </div>

          {formImages.length===0&&(
            <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:"24px 16px",borderRadius:14,border:`2px dashed ${tc.color}33`,background:tc.color+"08",cursor:"pointer"}}>
              <div style={{fontSize:36}}>📷</div>
              <div style={{fontSize:13,color:"#A7A9BE"}}>Toca para añadir fotos desde tu carrete</div>
              <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFormImageUpload}/>
            </label>
          )}

          {formImages.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {formImages.map((img,i)=>(
                <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"1",background:"#1C1B29"}}>
                  <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <button
                    onClick={()=>removeFormImage(i)}
                    style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:6,background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                  >✕</button>
                </div>
              ))}
              <label style={{borderRadius:10,aspectRatio:"1",background:"#1C1B29",border:`2px dashed ${tc.color}44`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer"}}>
                <div style={{fontSize:22,color:tc.color}}>+</div>
                <div style={{fontSize:10,color:"#A7A9BE"}}>Más</div>
                <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFormImageUpload}/>
              </label>
            </div>
          )}
        </div>

        <button style={S.primary} onClick={isEdit?updateAct:saveAct}>{isEdit?"Guardar cambios":"Agregar actividad"}</button>
      </div></div>
    );
  }

  // ── ACCOMMODATION FORM ───────────────────────────────────────────────────────
  if(view==="newAccommodation"||view==="editAccommodation"){
    const isEdit=view==="editAccommodation";
    return (
      <div style={S.app}><div style={{...S.scr,...S.form}}>
        <button style={S.back} onClick={()=>setView("detail")}>←</button>
        <div style={S.fTitle}>{isEdit?"Editar alojamiento":"Nuevo alojamiento 🏨"}</div>
        <div style={S.fg}><label style={S.lbl}>Nombre</label><input style={S.inp} placeholder="Ej: Hotel Shinjuku Granbell" value={accForm.name} onChange={e=>setAccForm({...accForm,name:e.target.value})}/></div>
        <div style={S.fg}>
          <label style={S.lbl}>Dirección (para Google Maps)</label>
          <input style={S.inp} placeholder="Ej: Shinjuku, Tokyo, Japan" value={accForm.address} onChange={e=>setAccForm({...accForm,address:e.target.value})}/>
          {accForm.address&&<button style={{marginTop:8,padding:"8px 14px",borderRadius:10,border:"none",background:"#1C4532",color:"#4ADE80",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}} onClick={()=>openMaps(accForm.address)}>🗺 Previsualizar en Maps</button>}
        </div>
        <div style={{display:"flex",gap:12,...S.fg}}>
          <div style={{flex:1}}><label style={S.lbl}>Check-in</label><input type="date" style={{...S.inp,fontSize:14,padding:"10px 12px"}} value={accForm.checkIn} onChange={e=>setAccForm({...accForm,checkIn:e.target.value})}/></div>
          <div style={{flex:1}}><label style={S.lbl}>Check-out</label><input type="date" style={{...S.inp,fontSize:14,padding:"10px 12px"}} value={accForm.checkOut} onChange={e=>setAccForm({...accForm,checkOut:e.target.value})}/></div>
        </div>
        <div style={S.fg}><label style={S.lbl}>Estrellas</label>
          <div style={S.starRow}>
            {STARS.map(n=><button key={n} style={S.starBtn(n,n<=(accForm.stars||0))} onClick={()=>setAccForm({...accForm,stars:n})}>★</button>)}
            <span style={{color:"#A7A9BE",fontSize:13,alignSelf:"center",marginLeft:4}}>{accForm.stars} estrella{accForm.stars!==1?"s":""}</span>
          </div>
        </div>
        <div style={S.fg}><label style={S.lbl}>Nota</label><input style={S.inp} placeholder="Reserva #4521 · Desayuno incluido" value={accForm.note} onChange={e=>setAccForm({...accForm,note:e.target.value})}/></div>
        <button style={S.primary} onClick={isEdit?updateAcc:saveAcc}>{isEdit?"Guardar cambios":"Añadir alojamiento"}</button>
      </div></div>
    );
  }

  // ── EXPENSE FORM ─────────────────────────────────────────────────────────────
  if(view==="newExpense"||view==="editExpense"){
    const isEdit=view==="editExpense";
    const members=activeTrip?.members||[];
    return (
      <div style={S.app}><div style={{...S.scr,...S.form}}>
        <button style={S.back} onClick={()=>setView("detail")}>←</button>
        <div style={S.fTitle}>{isEdit?"Editar gasto":"Nuevo gasto 💸"}</div>

        <div style={S.fg}><label style={S.lbl}>Descripción</label><input style={S.inp} placeholder="Ej: Cena en restaurante" value={expForm.title} onChange={e=>setExpForm({...expForm,title:e.target.value})}/></div>

        <div style={{display:"flex",gap:12,...S.fg}}>
          <div style={{flex:2}}>
            <label style={S.lbl}>Importe</label>
            <input type="number" inputMode="decimal" style={S.inp} placeholder="0.00" value={expForm.amount} onChange={e=>setExpForm({...expForm,amount:e.target.value})}/>
          </div>
          <div style={{flex:1}}>
            <label style={S.lbl}>Moneda</label>
            <select style={S.sel} value={expForm.currency} onChange={e=>setExpForm({...expForm,currency:e.target.value})}>
              {CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>

        <div style={S.fg}><label style={S.lbl}>Categoría</label>
          <div style={S.tg}>{Object.entries(EXP_CATS).map(([k,v])=>(
            <button key={k} style={S.to(expForm.category===k,v.color)} onClick={()=>setExpForm({...expForm,category:k})}>{v.emoji} {v.label}</button>
          ))}</div>
        </div>

        <div style={S.fg}><label style={S.lbl}>Pagado por</label>
          {members.length===0
            ? <div style={{fontSize:13,color:"#F87171",padding:"10px 0"}}>⚠️ Añade personas primero en la pestaña Gastos.</div>
            : <div style={S.tg}>{members.map(m=>(
                <button key={m.id} style={S.to(expForm.paidBy===m.id,"#FF6B6B")} onClick={()=>setExpForm({...expForm,paidBy:m.id})}>{m.avatar} {m.name}</button>
              ))}</div>
          }
        </div>

        <div style={S.fg}>
          <label style={S.lbl}>Dividir entre</label>

          {/* Mode toggle */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button
              onClick={()=>setExpForm({...expForm,splitMode:"equal"})}
              style={{flex:1,padding:"9px 0",borderRadius:12,border:`1.5px solid ${expForm.splitMode!=="custom"?"#34D399":"#2D2C3E"}`,background:expForm.splitMode!=="custom"?"#34D39922":"#1C1B29",color:expForm.splitMode!=="custom"?"#34D399":"#A7A9BE",fontWeight:expForm.splitMode!=="custom"?700:500,fontSize:13,cursor:"pointer"}}
            >⚖️ Partes iguales</button>
            <button
              onClick={()=>setExpForm({...expForm,splitMode:"custom"})}
              style={{flex:1,padding:"9px 0",borderRadius:12,border:`1.5px solid ${expForm.splitMode==="custom"?"#FBBF24":"#2D2C3E"}`,background:expForm.splitMode==="custom"?"#FBBF2422":"#1C1B29",color:expForm.splitMode==="custom"?"#FBBF24":"#A7A9BE",fontWeight:expForm.splitMode==="custom"?700:500,fontSize:13,cursor:"pointer"}}
            >✏️ Personalizado</button>
          </div>

          {/* EQUAL MODE */}
          {expForm.splitMode!=="custom"&&(
            <>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {members.map(m=>{
                  const sel=(expForm.splitWith||[]).includes(m.id);
                  return (
                    <button key={m.id} onClick={()=>toggleSplitMember(m.id)}
                      style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",borderRadius:12,border:`1.5px solid ${sel?"#34D399":"#2D2C3E"}`,background:sel?"#34D39922":"#1C1B29",color:sel?"#34D399":"#A7A9BE",cursor:"pointer",fontSize:13,fontWeight:sel?700:400}}>
                      <span>{m.avatar}</span><span>{m.name}</span>
                      {sel&&<span style={{fontSize:10,background:"#34D399",color:"#000",borderRadius:6,padding:"0 5px",fontWeight:800}}>✓</span>}
                    </button>
                  );
                })}
                {members.length>0&&<button onClick={()=>setExpForm({...expForm,splitWith:members.map(m=>m.id)})} style={{padding:"8px 12px",borderRadius:12,border:"1.5px solid #2D2C3E",background:"transparent",color:"#A7A9BE",cursor:"pointer",fontSize:12}}>Todos ✓</button>}
              </div>
              {(expForm.splitWith?.length||0)>0&&expForm.amount&&(
                <div style={{marginTop:8,fontSize:12,color:"#34D399"}}>
                  ÷ {expForm.splitWith.length} persona{expForm.splitWith.length!==1?"s":""}  =  <strong>{money(parseFloat(expForm.amount||0)/expForm.splitWith.length,expForm.currency)}/persona</strong>
                </div>
              )}
            </>
          )}

          {/* CUSTOM MODE */}
          {expForm.splitMode==="custom"&&(()=>{
            const total=parseFloat(expForm.amount)||0;
            const assigned=Math.round(members.reduce((sum,m)=>sum+(parseFloat(expForm.customAmounts?.[m.id])||0),0)*100)/100;
            const remaining=Math.round((total-assigned)*100)/100;
            const isBalanced=Math.abs(remaining)<0.01;
            return (
              <div>
                <div style={{fontSize:12,color:"#A7A9BE",marginBottom:10}}>Introduce el importe exacto para cada persona:</div>
                {members.map(m=>{
                  const val=expForm.customAmounts?.[m.id]??"";
                  return (
                    <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <div style={{width:36,height:36,borderRadius:10,background:"#1C1B29",border:"1px solid #2D2C3E",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{m.avatar}</div>
                      <div style={{fontSize:14,fontWeight:600,color:"#FFFFFE",minWidth:52}}>{m.name}</div>
                      <div style={{flex:1,position:"relative"}}>
                        <input
                          type="number" inputMode="decimal" placeholder="0.00" value={val}
                          onChange={e=>{
                            const newAmts={...expForm.customAmounts,[m.id]:e.target.value};
                            const sw=members.filter(x=>parseFloat(newAmts[x.id]||0)>0).map(x=>x.id);
                            setExpForm({...expForm,customAmounts:newAmts,splitWith:sw});
                          }}
                          style={{...S.inp,padding:"10px 44px 10px 14px",fontSize:14}}
                        />
                        <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"#A7A9BE",pointerEvents:"none"}}>{expForm.currency}</span>
                      </div>
                    </div>
                  );
                })}
                {/* Summary */}
                <div style={{marginTop:6,padding:"10px 14px",borderRadius:12,background:isBalanced?"#34D39914":"#FBBF2414",border:`1px solid ${isBalanced?"#34D39940":"#FBBF2440"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                    <span style={{color:"#A7A9BE"}}>Asignado</span>
                    <span style={{fontWeight:700,color:isBalanced?"#34D399":"#FBBF24"}}>{money(assigned,expForm.currency)} / {money(total,expForm.currency)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                    <span style={{color:"#A7A9BE"}}>{isBalanced?"✅ Cuadra perfectamente":"⚠️ Diferencia"}</span>
                    <span style={{fontWeight:700,color:isBalanced?"#34D399":"#F87171"}}>
                      {isBalanced?"—":(remaining>0?"-":"+")+" "+money(Math.abs(remaining),expForm.currency)}
                    </span>
                  </div>
                  {!isBalanced&&remaining>0&&(()=>{
                    const zeros=members.filter(m=>!(parseFloat(expForm.customAmounts?.[m.id])||0));
                    if(zeros.length===0) return null;
                    return (
                      <button
                        onClick={()=>{
                          const share=Math.round(remaining/zeros.length*100)/100;
                          const newAmts={...expForm.customAmounts};
                          zeros.forEach((m,i)=>{
                            newAmts[m.id]=i===zeros.length-1
                              ? String(Math.round((remaining-(share*(zeros.length-1)))*100)/100)
                              : String(share);
                          });
                          const sw=members.filter(x=>parseFloat(newAmts[x.id]||0)>0).map(x=>x.id);
                          setExpForm({...expForm,customAmounts:newAmts,splitWith:sw});
                        }}
                        style={{marginTop:8,width:"100%",padding:"7px 0",borderRadius:8,border:"none",background:"#FBBF2422",color:"#FBBF24",fontSize:12,fontWeight:700,cursor:"pointer"}}
                      >↕ Repartir lo restante entre los que faltan ({zeros.map(m=>m.name).join(", ")})</button>
                    );
                  })()}
                </div>
              </div>
            );
          })()}
        </div>

        <div style={S.fg}><label style={S.lbl}>Fecha</label><input type="date" style={{...S.inp,fontSize:15,padding:"12px 14px",color:"#FFFFFE",maxWidth:220}} value={expForm.date} onChange={e=>setExpForm({...expForm,date:e.target.value})}/></div>
        <div style={S.fg}><label style={S.lbl}>Nota (opcional)</label><input style={S.inp} placeholder="Ej: Incluye propina" value={expForm.note} onChange={e=>setExpForm({...expForm,note:e.target.value})}/></div>

        {/* ── FOTOS / TICKETS ── */}
        {(()=>{
          const ec=EXP_CATS[expForm.category]||EXP_CATS.otro;
          const imgs=expForm.images||[];
          const handleExpImgUpload=(e)=>{
            const files=Array.from(e.target.files||[]);
            files.forEach(file=>{
              const reader=new FileReader();
              reader.onload=ev=>setExpForm(f=>({...f,images:[...(f.images||[]),ev.target.result]}));
              reader.readAsDataURL(file);
            });
            e.target.value="";
          }
          return (
            <div style={S.fg}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <label style={{...S.lbl,marginBottom:0}}>🧾 Tickets / Fotos {imgs.length>0&&<span style={{color:ec.color,fontWeight:700}}>({imgs.length})</span>}</label>
                <label style={{padding:"6px 14px",borderRadius:10,background:ec.color+"22",border:`1.5px solid ${ec.color}44`,color:ec.color,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  + Añadir
                  <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleExpImgUpload}/>
                </label>
              </div>
              {imgs.length===0?(
                <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:"20px 16px",borderRadius:14,border:`2px dashed ${ec.color}33`,background:ec.color+"08",cursor:"pointer"}}>
                  <div style={{fontSize:32}}>🧾</div>
                  <div style={{fontSize:13,color:"#A7A9BE"}}>Añade fotos de tickets o facturas</div>
                  <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleExpImgUpload}/>
                </label>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {imgs.map((img,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"1",background:"#1C1B29"}}>
                      <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <button onClick={()=>setExpForm(f=>({...f,images:(f.images||[]).filter((_,j)=>j!==i)}))} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:6,background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                    </div>
                  ))}
                  <label style={{borderRadius:10,aspectRatio:"1",background:"#1C1B29",border:`2px dashed ${ec.color}44`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer"}}>
                    <div style={{fontSize:22,color:ec.color}}>+</div>
                    <div style={{fontSize:10,color:"#A7A9BE"}}>Más</div>
                    <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleExpImgUpload}/>
                  </label>
                </div>
              )}
            </div>
          );
        })()}

        <button style={S.primary} onClick={isEdit?updateExp:saveExp}>{isEdit?"Guardar cambios":"Añadir gasto"}</button>
      </div></div>
    );
  }

  // ── ACTIVITY DETAIL ──────────────────────────────────────────────────────────
  if(view==="actDetail" && activeAct && activeDay && activeTrip) {
    const tc = TYPE_CONFIG[activeAct.type]||TYPE_CONFIG.actividad;
    const images = activeAct.images||[];

    return (
      <div style={S.app}>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}} .img-del:hover{opacity:1!important}`}</style>
        <div style={S.scr}>

          {/* Header */}
          <div style={{background:`linear-gradient(160deg,${tc.color},${tc.color}99)`,padding:"56px 24px 28px",position:"relative"}}>
            <button style={S.dBack} onClick={()=>setView("detail")}>← Días</button>
            <div style={{fontSize:52,lineHeight:1,marginBottom:8}}>{tc.emoji}</div>
            <div style={{fontSize:24,fontWeight:900,color:"#fff",letterSpacing:"-0.4px",lineHeight:1.2}}>{activeAct.title}</div>
            {/* type pill */}
            <div style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"5px 14px"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#fff",textTransform:"uppercase",letterSpacing:1}}>{tc.label}</span>
            </div>
          </div>

          {/* Info cards row */}
          <div style={{display:"flex",gap:0,background:"#13121F",borderBottom:"1px solid #1C1B29"}}>
            {[
              ["🕐 Hora", activeAct.time||"—"],
              ["📅 Día",  fmtLong(activeDay.date).split(",")[0]||"—"],
              ["🖼 Fotos", String(images.length)],
            ].map(([l,v],i)=>(
              <div key={i} style={{flex:1,padding:"14px 10px",textAlign:"center",borderRight:i<2?"1px solid #1C1B29":"none"}}>
                <div style={{fontSize:11,color:"#A7A9BE",marginBottom:3}}>{l}</div>
                <div style={{fontSize:15,fontWeight:700,color:"#FFFFFE"}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Scrollable content */}
          <div style={{flex:1,overflowY:"auto",padding:"20px 20px 100px",display:"flex",flexDirection:"column",gap:16}}>

            {/* Location */}
            {activeAct.location&&(
              <div
                onClick={()=>window.open(mapsUrl(activeAct.location),"_blank")}
                style={{background:"#1C4532",border:"1px solid #34D39933",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
              >
                <div style={{width:40,height:40,borderRadius:11,background:"#34D39922",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📍</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#34D399",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Ubicación</div>
                  <div style={{fontSize:14,fontWeight:600,color:"#FFFFFE",lineHeight:1.4}}>{activeAct.location}</div>
                  <div style={{fontSize:11,color:"#34D399",marginTop:3}}>Toca para abrir en Google Maps →</div>
                </div>
                <div style={{fontSize:20,color:"#34D399",flexShrink:0}}>›</div>
              </div>
            )}

            {/* Note */}
            {activeAct.note&&(
              <div style={{background:"#1C1B29",borderRadius:16,padding:"16px",border:"1px solid #2D2C3E"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#A7A9BE",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📝 Nota</div>
                <div style={{fontSize:15,color:"#FFFFFE",lineHeight:1.6}}>{activeAct.note}</div>
              </div>
            )}

            {/* Photos section */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:"#A7A9BE",textTransform:"uppercase",letterSpacing:1}}>📸 Fotos</div>
                {/* Upload button */}
                <label style={{padding:"7px 14px",borderRadius:12,background:tc.color+"22",border:`1.5px solid ${tc.color}44`,color:tc.color,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  + Añadir foto
                  <input type="file" accept="image/*" multiple style={{display:"none"}}
                    onChange={e=>handleImageUpload(activeDay.id, activeAct.id, e)}/>
                </label>
              </div>

              {images.length===0&&(
                <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:"32px 20px",borderRadius:16,border:`2px dashed ${tc.color}44`,background:tc.color+"0A",cursor:"pointer"}}>
                  <div style={{fontSize:44}}>📷</div>
                  <div style={{fontSize:14,fontWeight:600,color:"#A7A9BE"}}>Toca para añadir fotos</div>
                  <div style={{fontSize:12,color:"#A7A9BE55"}}>Desde tu carrete o cámara</div>
                  <input type="file" accept="image/*" multiple style={{display:"none"}}
                    onChange={e=>handleImageUpload(activeDay.id, activeAct.id, e)}/>
                </label>
              )}

              {images.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {images.map((img,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:12,overflow:"hidden",aspectRatio:"1",background:"#1C1B29"}} onClick={()=>setLightbox(i)}>
                      <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block",cursor:"pointer"}}/>
                      <button
                        className="img-del"
                        onClick={e=>{e.stopPropagation();removeImageFromActivity(activeDay.id,activeAct.id,i);}}
                        style={{position:"absolute",top:6,right:6,width:26,height:26,borderRadius:8,background:"rgba(0,0,0,0.65)",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:0.85}}
                      >✕</button>
                    </div>
                  ))}
                  {/* Add more tile */}
                  <label style={{borderRadius:12,aspectRatio:"1",background:"#1C1B29",border:`2px dashed ${tc.color}44`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer"}}>
                    <div style={{fontSize:28,color:tc.color}}>+</div>
                    <div style={{fontSize:11,color:"#A7A9BE"}}>Añadir</div>
                    <input type="file" accept="image/*" multiple style={{display:"none"}}
                      onChange={e=>handleImageUpload(activeDay.id, activeAct.id, e)}/>
                  </label>
                </div>
              )}
            </div>
          </div>

          {/* Lightbox */}
          {lightbox!==null&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}} onClick={()=>setLightbox(null)}>
              <img src={images[lightbox]} alt="" style={{maxWidth:"100%",maxHeight:"80vh",objectFit:"contain",borderRadius:8}}/>
              <div style={{color:"#A7A9BE",fontSize:13,marginTop:12}}>{lightbox+1} / {images.length} · Toca para cerrar</div>
              {images.length>1&&(
                <div style={{display:"flex",gap:16,marginTop:16}}>
                  <button onClick={e=>{e.stopPropagation();setLightbox(l=>(l-1+images.length)%images.length);}} style={{background:"#1C1B29",border:"none",color:"#fff",fontSize:24,padding:"8px 18px",borderRadius:12,cursor:"pointer"}}>‹</button>
                  <button onClick={e=>{e.stopPropagation();setLightbox(l=>(l+1)%images.length);}} style={{background:"#1C1B29",border:"none",color:"#fff",fontSize:24,padding:"8px 18px",borderRadius:12,cursor:"pointer"}}>›</button>
                </div>
              )}
            </div>
          )}

          {/* Bottom action buttons */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0F0E17",borderTop:"1px solid #1C1B29",padding:"12px 20px 28px",display:"flex",gap:10,boxSizing:"border-box"}}>
            <button
              style={{flex:1,padding:"13px 0",borderRadius:14,border:"1.5px solid #2D2C3E",background:"#1C1B29",color:"#A7A9BE",fontSize:14,fontWeight:600,cursor:"pointer"}}
              onClick={()=>{openEditAct(activeDay,activeAct);}}
            >✏️ Editar actividad</button>
            <button
              style={{flex:1,padding:"13px 0",borderRadius:14,border:"1.5px solid #F8717133",background:"#F8717111",color:"#F87171",fontSize:14,fontWeight:600,cursor:"pointer"}}
              onClick={()=>{deleteAct(activeDay.id,activeAct.id);setView("detail");}}
            >🗑 Eliminar</button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// ─── SYNC WRAPPER WITH SUPABASE ───────────────────────────────────────────────
function App() {
  const [user, setUser]             = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [trips, setTrips]           = useState([]);
  const [syncing, setSyncing]       = useState(false);
  const [sbError, setSbError]       = useState(false);

  // Check auth on load
  useEffect(() => {
    // Timeout — if Supabase doesn't respond in 8s, show error
    const timeout = setTimeout(() => {
      if (!authChecked) setSbError(true);
    }, 8000);

    sb.auth.getSession().then(({ data, error }) => {
      clearTimeout(timeout);
      if (error) { setSbError(true); return; }
      setUser(data.session?.user || null);
      setAuthChecked(true);
    }).catch(() => {
      clearTimeout(timeout);
      setSbError(true);
    });

    const { data: listener } = sb.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user || null);
      setAuthChecked(true);
    });
    return () => { clearTimeout(timeout); listener.subscription.unsubscribe(); };
  }, []);

  // Load + subscribe to trips when user logs in
  useEffect(() => {
    if (!user) { setTrips([]); return; }

    // Load from Supabase
    sb.from('trips')
      .select('*')
      .contains('member_ids', [user.id])
      .order('created_at', { ascending: true })
      .then(({ data }) => {
        if (data && data.length > 0) {
          setTrips(data.map(r => ({ ...r.data, id: r.id, _dbid: r.id, owner_id: r.owner_id, member_ids: r.member_ids, invite_code: r.invite_code })));
        } else {
          // First login — load local data if any and migrate
          const local = loadLocal();
          if (local.length > 0) {
            setTrips(local);
            // migrate local trips to cloud
            local.forEach(t => saveTrip({ ...t, member_ids: [user.id] }));
          }
        }
      });

    // Real-time subscription
    const channel = sb.channel('trips-' + user.id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trips' }, payload => {
        if (payload.eventType === 'DELETE') {
          setTrips(prev => prev.filter(t => t._dbid !== payload.old.id));
        } else {
          const row = payload.new;
          const trip = { ...row.data, id: row.id, _dbid: row.id, owner_id: row.owner_id, member_ids: row.member_ids, invite_code: row.invite_code };
          setTrips(prev => {
            const exists = prev.find(t => t._dbid === row.id);
            if (exists) return prev.map(t => t._dbid === row.id ? trip : t);
            return [...prev, trip];
          });
        }
      })
      .subscribe();

    return () => sb.removeChannel(channel);
  }, [user]);

  // Save trip to Supabase + localStorage
  const saveTrip = useCallback(async (trip) => {
    if (!user) return;
    setSyncing(true);
    // Always preserve existing member_ids from DB, add current user if missing
    const existingTrip = trips.find(t => t.id === trip.id);
    const existingMemberIds = existingTrip?.member_ids || trip.member_ids || [user.id];
    const memberIds = existingMemberIds.includes(user.id) ? existingMemberIds : [...existingMemberIds, user.id];
    const payload = {
      data: { ...trip, member_ids: memberIds },
      member_ids: memberIds,
      owner_id: trip.owner_id || user.id,
      updated_at: new Date().toISOString()
    };
    try {
      if (trip._dbid) {
        await sb.from('trips').update(payload).eq('id', trip._dbid);
      } else {
        const { data } = await sb.from('trips').insert({ ...payload, created_at: new Date().toISOString() }).select().single();
        if (data) {
          setTrips(prev => prev.map(t => t.id === trip.id ? { ...trip, _dbid: data.id } : t));
        }
      }
    } catch(e) { console.error('saveTrip error:', e); }
    setSyncing(false);
  }, [user, trips]);

  const handleAddTrip = useCallback((trip) => {
    const newTrip = { ...trip, member_ids: [user?.id], owner_id: user?.id };
    setTrips(prev => [...prev, newTrip]);
    saveTrip(newTrip);
    return newTrip;
  }, [user, saveTrip]);

  const handleUpdateTrip = useCallback((updated) => {
    setTrips(prev => prev.map(t => t.id === updated.id ? updated : t));
    saveTrip(updated);
  }, [saveTrip]);

  const handleDeleteTrip = useCallback(async (tripId, fullDelete = false) => {
    const trip = trips.find(t => t.id === tripId);
    if (!trip?._dbid) { setTrips(prev => prev.filter(t => t.id !== tripId)); return; }

    if (fullDelete) {
      // Delete completely for everyone
      setTrips(prev => prev.filter(t => t.id !== tripId));
      await sb.from('trips').delete().eq('id', trip._dbid);
    } else {
      // Just remove current user from member_ids
      const newMemberIds = (trip.member_ids || []).filter(id => id !== user.id);
      setTrips(prev => prev.filter(t => t.id !== tripId));
      if (newMemberIds.length === 0) {
        // No members left, delete completely
        await sb.from('trips').delete().eq('id', trip._dbid);
      } else {
        const updatedData = { ...(trip || {}), member_ids: newMemberIds };
        await sb.from('trips').update({ member_ids: newMemberIds, data: updatedData }).eq('id', trip._dbid);
      }
    }
  }, [trips, user]);

  const handleLogout = useCallback(async () => {
    await sb.auth.signOut();
    setTrips([]);
  }, []);

  // ── INVITE SYSTEM ─────────────────────────────────────────────────────────
  const [showJoin, setShowJoin]       = useState(false);
  const [joinCode, setJoinCode]       = useState('');
  const [joinError, setJoinError]     = useState('');
  const [joinLoading, setJoinLoading] = useState(false);
  const [joinSuccess, setJoinSuccess] = useState('');

  const generateInviteCode = useCallback(async (trip) => {
    if (!trip._dbid) return;
    // Generate random 7-char code
    const code = Math.random().toString(36).substring(2,9).toUpperCase();
    try {
      await sb.from('trips').update({ invite_code: code }).eq('id', trip._dbid);
      // Update local trip
      setTrips(prev => prev.map(t => t._dbid === trip._dbid ? { ...t, invite_code: code } : t));
      return code;
    } catch(e) { console.error(e); return null; }
  }, []);

  const joinByCode = useCallback(async (code) => {
    if (!user || !code.trim()) return;
    setJoinLoading(true); setJoinError(''); setJoinSuccess('');
    try {
      // Use RPC function that bypasses RLS
      const { data: result, error } = await sb.rpc('join_trip_by_code', {
        p_code: code.trim().toUpperCase(),
        p_user_id: user.id
      });
      if (error) { setJoinError('Error: ' + error.message); setJoinLoading(false); return; }
      if (result?.error) { setJoinError(result.error); setJoinLoading(false); return; }

      // Fetch the full trip now that we're a member
      const { data: tripRow } = await sb.from('trips').select('*').eq('id', result.trip_id).single();
      if (tripRow) {
        const trip = { ...tripRow.data, id: tripRow.id, _dbid: tripRow.id, owner_id: tripRow.owner_id, member_ids: tripRow.member_ids, invite_code: tripRow.invite_code };
        setTrips(prev => {
          const exists = prev.find(t => t._dbid === tripRow.id);
          return exists ? prev : [...prev, trip];
        });
        setJoinSuccess(`¡Te uniste a "${tripRow.data?.title || 'el viaje'}"! 🎉`);
      } else {
        setJoinSuccess('¡Te uniste al viaje! 🎉');
      }
      setJoinCode('');
      setTimeout(() => { setShowJoin(false); setJoinSuccess(''); }, 2500);
    } catch(e) { setJoinError('Error al unirse: ' + e.message); }
    setJoinLoading(false);
  }, [user]);

  if (sbError) return (
    <div style={{minHeight:'100vh',background:'#0F0E17',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,padding:24}}>
      <div style={{fontSize:56}}>⚠️</div>
      <div style={{color:'#F87171',fontSize:18,fontWeight:700,textAlign:'center'}}>No se puede conectar</div>
      <div style={{color:'#A7A9BE',fontSize:14,textAlign:'center',lineHeight:1.6,maxWidth:320}}>
        No se puede conectar con el servidor. Comprueba tu conexión a internet e inténtalo de nuevo.
      </div>
      <button
        onClick={()=>{ setSbError(false); setAuthChecked(false); window.location.reload(); }}
        style={{marginTop:8,padding:'13px 28px',background:'#FF6B6B',border:'none',borderRadius:14,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 6px 20px rgba(255,107,107,0.35)'}}
      >🔄 Reintentar</button>
    </div>
  );

  if (!authChecked) return (
    <div style={{minHeight:'100vh',background:'#0F0E17',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:56}}>✈️</div>
      <div style={{color:'#A7A9BE',fontSize:14}}>Cargando...</div>
      <div style={{width:32,height:32,border:'3px solid #2D2C3E',borderTopColor:'#FF6B6B',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
    </div>
  );

  if (!user) return <AuthScreen onLogin={setUser}/>;

  return (
    <AppInner
      cloudTrips={trips}
      onSaveTrip={handleUpdateTrip}
      onAddTrip={handleAddTrip}
      onDeleteTrip={handleDeleteTrip}
      currentUser={{ ...user, displayName: user.user_metadata?.full_name || user.email }}
      onLogout={handleLogout}
      syncing={syncing}
      onGenerateInvite={generateInviteCode}
      showJoin={showJoin} setShowJoin={setShowJoin}
      joinCode={joinCode} setJoinCode={setJoinCode}
      joinError={joinError} joinLoading={joinLoading}
      joinSuccess={joinSuccess} onJoin={joinByCode}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
