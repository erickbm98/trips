// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [mode, setMode]       = useState('login');
  const [email, setEmail]     = useState('');
  const [pass, setPass]       = useState('');
  const [name, setName]       = useState('');
  const [error, setError]     = useState('');
  const [loading, setLoading] = useState(false);
  const [sent, setSent]       = useState(false);

  const handleSubmit = async () => {
    if (!email) { setError('Escribe tu email'); return; }
    if (!pass)  { setError('Escribe tu contraseña'); return; }
    setLoading(true); setError('');
    try {
      if (mode === 'register') {
        if (!name.trim()) { setError('Escribe tu nombre'); setLoading(false); return; }
        const { data, error: e } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name.trim() } } });
        if (e) throw e;
        if (data.user && !data.session) { setSent(true); setLoading(false); return; }
        onLogin(data.user);
      } else {
        const { data, error: e } = await sb.auth.signInWithPassword({ email, password: pass });
        if (e) throw e;
        onLogin(data.user);
      }
    } catch(e) {
      const msgs = {
        'Invalid login credentials': 'Email o contraseña incorrectos',
        'User already registered': 'Este email ya está registrado. Inicia sesión.',
        'Password should be at least 6 characters': 'La contraseña debe tener al menos 6 caracteres',
        'Unable to validate email address: invalid format': 'El formato del email no es válido',
      };
      setError(msgs[e.message] || e.message);
    }
    setLoading(false);
  };

  if (sent) return (
    <div style={{minHeight:'100vh',background:'#0F0E17',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{maxWidth:380,width:'100%',background:'#1C1B29',borderRadius:24,padding:'40px 28px',textAlign:'center',border:'1px solid #2D2C3E'}}>
        <div style={{fontSize:56,marginBottom:16}}>📬</div>
        <div style={{fontSize:22,fontWeight:800,color:'#FFFFFE',marginBottom:12}}>¡Revisa tu email!</div>
        <div style={{fontSize:14,color:'#A7A9BE',lineHeight:1.6,marginBottom:24}}>Te hemos enviado un enlace de confirmación a <strong style={{color:'#FFFFFE'}}>{email}</strong>. Ábrelo para activar tu cuenta y luego inicia sesión.</div>
        <button onClick={()=>{setSent(false);setMode('login');}} style={{width:'100%',padding:14,background:'#FF6B6B',border:'none',borderRadius:14,color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>Volver al login</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'#0F0E17',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{maxWidth:380,width:'100%',background:'#1C1B29',borderRadius:28,padding:'40px 28px',border:'1px solid #2D2C3E'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:72,height:72,borderRadius:20,background:'linear-gradient(135deg,#FF6B6B,#6366F1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 14px'}}>✈️</div>
          <div style={{fontSize:26,fontWeight:800,color:'#FFFFFE',letterSpacing:-0.5}}>Mis Viajes</div>
          <div style={{fontSize:13,color:'#A7A9BE',marginTop:6}}>{mode==='login'?'Inicia sesión para continuar':'Crea tu cuenta gratis'}</div>
        </div>

        {error&&<div style={{background:'#F8717118',border:'1px solid #F87171',borderRadius:12,padding:'11px 14px',color:'#F87171',fontSize:13,marginBottom:16,lineHeight:1.5}}>⚠️ {error}</div>}

        {mode==='register'&&(
          <>
            <div style={{fontSize:11,fontWeight:600,color:'#A7A9BE',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Tu nombre</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Erick" style={{width:'100%',background:'#13121F',border:'1px solid #2D2C3E',borderRadius:12,padding:'13px 14px',color:'#FFFFFE',fontSize:15,outline:'none',marginBottom:14,boxSizing:'border-box'}}/>
          </>
        )}
        <div style={{fontSize:11,fontWeight:600,color:'#A7A9BE',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Email</div>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" style={{width:'100%',background:'#13121F',border:'1px solid #2D2C3E',borderRadius:12,padding:'13px 14px',color:'#FFFFFE',fontSize:15,outline:'none',marginBottom:14,boxSizing:'border-box'}}/>
        <div style={{fontSize:11,fontWeight:600,color:'#A7A9BE',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Contraseña</div>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Mínimo 6 caracteres" onKeyDown={e=>e.key==='Enter'&&handleSubmit()} style={{width:'100%',background:'#13121F',border:'1px solid #2D2C3E',borderRadius:12,padding:'13px 14px',color:'#FFFFFE',fontSize:15,outline:'none',marginBottom:20,boxSizing:'border-box'}}/>

          </button>
        </div>
      </div>
    </div>
  );

// ─── PWA installer: injects all meta tags needed for iPhone home screen app ──
function usePWA() {
  useEffect(() => {
    // Prevent double-injection
    if (document.querySelector('meta[name="apple-mobile-web-app-capable"]')) return;

    const head = document.head;

    const metas = [
      { name: "apple-mobile-web-app-capable",           content: "yes" },
      { name: "apple-mobile-web-app-status-bar-style",  content: "black-translucent" },
      { name: "apple-mobile-web-app-title",             content: "Mis Viajes" },
      { name: "mobile-web-app-capable",                 content: "yes" },
      { name: "theme-color",                            content: "#0F0E17" },
      { name: "viewport",                               content: "width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" },
    ];

    metas.forEach(({ name, content }) => {
      // update existing viewport meta if present, else create
      let el = document.querySelector(`meta[name="${name}"]`);
      if (!el) { el = document.createElement("meta"); el.name = name; head.appendChild(el); }
      el.content = content;
    });

    // Title
    document.title = "Mis Viajes ✈️";

    // Inline SVG app icon (airplane + gradient) as apple-touch-icon
    if (!document.querySelector('link[rel="apple-touch-icon"]')) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <rect width="512" height="512" rx="110" fill="#0F0E17"/>
        <rect width="512" height="512" rx="110" fill="url(#g)"/>
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FF6B6B"/>
            <stop offset="100%" stop-color="#6366F1"/>
          </linearGradient>
        </defs>
        <text x="256" y="340" font-size="260" text-anchor="middle" font-family="Apple Color Emoji,sans-serif">✈️</text>
      </svg>`;
      const blob = new Blob([svg], { type: "image/svg+xml" });
      const url  = URL.createObjectURL(blob);
      const link = document.createElement("link");
      link.rel  = "apple-touch-icon";
      link.href = url;
      head.appendChild(link);

      // also regular favicon
      const fav = document.createElement("link");
      fav.rel  = "icon";
      fav.href = url;
      head.appendChild(fav);
    }

    // Global CSS: remove rubber-band scroll, safe-area insets, remove tap highlight
    const style = document.createElement("style");
    style.textContent = `
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      html, body {
        overscroll-behavior: none;
        background: #0F0E17;
        margin: 0; padding: 0;
        height: 100%;
        font-family: -apple-system, 'DM Sans', sans-serif;
      }
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      input, select, textarea { font-size: 16px !important; }
    `;
    head.appendChild(style);
  }, []);
}

function loadJsPDF() {
  return new Promise((resolve) => {
    if (window.jspdf) { resolve(window.jspdf.jsPDF); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = () => resolve(window.jspdf.jsPDF);
    document.head.appendChild(s);
  });
}

// ─── Tricount-style balance calculator ────────────────────────────────────────
function calcBalances(members, expenses) {
  const paid   = {};
  const owes   = {};
  members.forEach(m => { paid[m.id]=0; owes[m.id]=0; });

  expenses.forEach(exp => {
    if(paid[exp.paidBy]!==undefined) paid[exp.paidBy] += exp.amount;

    if(exp.splitMode==="custom" && exp.customAmounts && Object.keys(exp.customAmounts).length>0){
      // Use explicit per-person amounts
      Object.entries(exp.customAmounts).forEach(([mid,amt])=>{
        if(owes[mid]!==undefined) owes[mid] += parseFloat(amt)||0;
      });
    } else {
      const share = exp.amount / (exp.splitWith?.length||1);
      (exp.splitWith||[]).forEach(mid => { if(owes[mid]!==undefined) owes[mid] += share; });
    }
  });

  const net = {};
  members.forEach(m => { net[m.id] = paid[m.id] - owes[m.id]; });

  const settlements = [];
  const pos = members.filter(m=>net[m.id]>0.005).map(m=>({id:m.id,amt:net[m.id]})).sort((a,b)=>b.amt-a.amt);
  const neg = members.filter(m=>net[m.id]<-0.005).map(m=>({id:m.id,amt:-net[m.id]})).sort((a,b)=>b.amt-a.amt);
  let pi=0, ni=0;
  while(pi<pos.length && ni<neg.length){
    const settle=Math.min(pos[pi].amt,neg[ni].amt);
    if(settle>0.005) settlements.push({from:neg[ni].id,to:pos[pi].id,amount:settle});
    pos[pi].amt-=settle; neg[ni].amt-=settle;
    if(pos[pi].amt<0.005)pi++;
    if(neg[ni].amt<0.005)ni++;
  }
  return { paid, owes, net, settlements };
}

async function generateTripPDF(trip) {
  const JsPDF = await loadJsPDF();
  const doc = new JsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, H=297, M=18, CW=174;
  const rgb = hexRgb(trip.color);
  const accs = trip.accommodations||[];
  const exps = trip.expenses||[];
  const mems = trip.members||[];

  // COVER
  doc.setFillColor(...rgb); doc.rect(0,0,W,82,"F");
  doc.setDrawColor(255,255,255); doc.setLineWidth(0.4);
  doc.circle(W-28,18,36,"S"); doc.circle(W-28,18,22,"S");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(30); doc.text(trip.title,M,34);
  doc.setFont("helvetica","normal"); doc.setFontSize(13); doc.text("Destino: "+trip.destination,M,48);
  doc.setFontSize(10);
  doc.text(fmt(trip.startDate)+"   ->   "+fmt(trip.endDate),M,61);
  const totalActs=trip.days.reduce((a,d)=>a+d.activities.length,0);
  const totalExp=exps.reduce((a,e)=>a+e.amount,0);
  doc.text(daysBetween(trip.startDate,trip.endDate)+" dias  ·  "+totalActs+" actividades  ·  "+accs.length+" aloj.  ·  "+mems.length+" personas",M,72);

  const stats=[{label:"DIAS",val:String(daysBetween(trip.startDate,trip.endDate))},{label:"GASTOS",val:money(totalExp,(exps[0]?.currency)||"EUR")},{label:"PERSONAS",val:String(mems.length)}];
  const cw=(CW-8)/3;
  stats.forEach((st,i)=>{ const cx=M+i*(cw+4);
    doc.setFillColor(246,247,252); doc.roundedRect(cx,90,cw,24,3,3,"F");
    doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(st.label==="GASTOS"?12:16);
    doc.text(st.val,cx+cw/2,102,{align:"center"});
    doc.setTextColor(140,140,160); doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
    doc.text(st.label,cx+cw/2,109,{align:"center"});
  });

  // Alojamientos
  let cy=126;
  if(accs.length>0){
    doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("ALOJAMIENTOS",M,cy);
    doc.setDrawColor(...rgb); doc.setLineWidth(0.5); doc.line(M,cy+2,M+48,cy+2); cy+=10;
    accs.forEach((acc,i)=>{
      const bh=acc.note?22:16;
      doc.setFillColor(i%2===0?247:252,i%2===0?248:252,i%2===0?253:255);
      doc.roundedRect(M,cy,CW,bh-2,2,2,"F");
      doc.setFillColor(...rgb); doc.roundedRect(M,cy,3,bh-2,1,1,"F");
      doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(10);
      doc.text(doc.splitTextToSize(acc.name,CW-30)[0],M+7,cy+8);
      doc.setTextColor(100,100,130); doc.setFont("helvetica","normal"); doc.setFontSize(8);
      doc.text(fmt(acc.checkIn)+" -> "+fmt(acc.checkOut),M+7,cy+14);
      if(acc.note){ doc.setTextColor(130,130,155); doc.setFontSize(7.5); doc.text(doc.splitTextToSize(acc.note,CW-15)[0],M+7,cy+bh-5); }
      cy+=bh+3;
    });
    cy+=4;
  }

  doc.setTextColor(185,185,205); doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("Generado el "+new Date().toLocaleDateString("es-ES"),W/2,H-10,{align:"center"});
  doc.setDrawColor(...rgb); doc.setLineWidth(1.5); doc.line(0,H-4,W,H-4);

  // EXPENSES PAGE
  if(exps.length>0){
    doc.addPage();
    doc.setFillColor(...rgb); doc.rect(0,0,W,28,"F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(14);
    doc.text("GASTOS DEL VIAJE",M,18);
    doc.setFont("helvetica","normal"); doc.setFontSize(9);
    doc.text(exps.length+" gastos  ·  Total: "+money(totalExp,(exps[0]?.currency)||"EUR"),W-M,18,{align:"right"});

    // balances
    if(mems.length>0){
      const bal=calcBalances(mems,exps);
      let by=40;
      doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text("BALANCE POR PERSONA",M,by);
      doc.setDrawColor(...rgb); doc.setLineWidth(0.5); doc.line(M,by+2,M+60,by+2); by+=10;
      mems.forEach((m,i)=>{
        const n=bal.net[m.id]||0;
        doc.setFillColor(i%2===0?247:252,i%2===0?248:252,i%2===0?253:255);
        doc.roundedRect(M,by,CW,13,2,2,"F");
        doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(10);
        doc.text(m.name,M+6,by+9);
        const col=n>=0?[34,197,94]:[239,68,68];
        doc.setTextColor(...col); doc.setFont("helvetica","bold"); doc.setFontSize(10);
        doc.text((n>=0?"+":"")+money(Math.abs(n),(exps[0]?.currency)||"EUR"),W-M,by+9,{align:"right"});
        by+=16;
      });

      // settlements
      if(bal.settlements.length>0){
        by+=4;
        doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(9);
        doc.text("LIQUIDACIONES SUGERIDAS",M,by);
        doc.setDrawColor(...rgb); doc.setLineWidth(0.5); doc.line(M,by+2,M+70,by+2); by+=10;
        bal.settlements.forEach((s,i)=>{
          const fm=mems.find(m=>m.id===s.from);
          const tm=mems.find(m=>m.id===s.to);
          if(!fm||!tm)return;
          doc.setFillColor(i%2===0?247:252,i%2===0?248:252,i%2===0?253:255);
          doc.roundedRect(M,by,CW,13,2,2,"F");
          doc.setTextColor(28,28,48); doc.setFont("helvetica","normal"); doc.setFontSize(10);
          doc.text(fm.name+" → "+tm.name,M+6,by+9);
          doc.setTextColor(34,197,94); doc.setFont("helvetica","bold");
          doc.text(money(s.amount,(exps[0]?.currency)||"EUR"),W-M,by+9,{align:"right"});
          by+=16;
        });
        by+=4;
      }

      // expense list
      by+=4;
      doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text("LISTA DE GASTOS",M,by);
      doc.setDrawColor(...rgb); doc.setLineWidth(0.5); doc.line(M,by+2,M+48,by+2); by+=10;
      exps.forEach((exp,i)=>{
        const bh=exp.note?22:16;
        if(by+bh>H-18){ doc.addPage(); by=18; }
        const ec=EXP_CATS[exp.category]||EXP_CATS.otro;
        doc.setFillColor(i%2===0?247:252,i%2===0?248:252,i%2===0?253:255);
        doc.roundedRect(M,by,CW,bh-2,2,2,"F");
        doc.setFillColor(...hexRgb(ec.color)); doc.roundedRect(M,by,3,bh-2,1,1,"F");
        doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(10);
        doc.text(doc.splitTextToSize(exp.title,CW-55)[0],M+7,by+8);
        doc.setTextColor(...hexRgb(ec.color)); doc.setFont("helvetica","bold"); doc.setFontSize(10);
        doc.text(money(exp.amount,exp.currency),W-M,by+8,{align:"right"});
        doc.setTextColor(100,100,130); doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
        const payer=mems.find(m=>m.id===exp.paidBy);
        doc.text("Pagó: "+(payer?.name||"?")+"  ·  "+fmt(exp.date),M+7,by+14);
        if(exp.note){ doc.setTextColor(150,150,170); doc.setFontSize(7); doc.text(exp.note,M+7,by+bh-4); }
        by+=bh+3;
      });
    }

    doc.setTextColor(185,185,205); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    doc.text(trip.title+"  ·  Gastos",W/2,H-10,{align:"center"});
    doc.setDrawColor(...rgb); doc.setLineWidth(0.8); doc.line(M,H-6,W-M,H-6);
  }

  // DAY PAGES
  trip.days.forEach((day,dayIdx)=>{
    doc.addPage();
    doc.setFillColor(...rgb); doc.rect(0,0,W,28,"F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text("DIA "+(dayIdx+1),M,12);
    doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.text(fmtLong(day.date),M,21);
    doc.setFontSize(9); doc.text(day.activities.length+" actividad"+(day.activities.length!==1?"es":""),W-M,16,{align:"right"});
    const activeAcc=accs.find(a=>day.date>=a.checkIn&&day.date<a.checkOut);
    let ay=40;
    if(activeAcc){
      doc.setFillColor(220,210,255); doc.roundedRect(M,ay,CW,14,2,2,"F");
      doc.setFillColor(...hexRgb("#A78BFA")); doc.roundedRect(M,ay,3,14,1,1,"F");
      doc.setTextColor(80,40,160); doc.setFont("helvetica","bold"); doc.setFontSize(8);
      doc.text("Alojamiento: "+activeAcc.name,M+7,ay+9); ay+=20;
    }
    if(day.activities.length===0){ doc.setTextColor(180,180,200); doc.setFont("helvetica","italic"); doc.setFontSize(11); doc.text("Sin actividades.",M,ay); }
    day.activities.forEach((act,idx)=>{
      const tc=TYPE_CONFIG[act.type]||TYPE_CONFIG.actividad;
      const images=(act.images||[]).filter(img=>img&&(img.startsWith("data:")||img.startsWith("http")));
      const hasPhotos=images.length>0;
      const bh=act.note?23:17;

      // Check page overflow for activity row
      if(ay+bh>H-18){ doc.addPage(); doc.setFillColor(...rgb); doc.rect(0,0,W,16,"F"); doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.text("DIA "+(dayIdx+1)+" (cont.)",M,11); ay=26; }

      // Activity row
      doc.setFillColor(idx%2===0?247:252,idx%2===0?248:252,idx%2===0?253:255);
      doc.roundedRect(M,ay,CW,bh-2,2,2,"F");
      doc.setFillColor(...tc.hex); doc.roundedRect(M,ay,3,bh-2,1,1,"F");
      doc.setTextColor(...tc.hex); doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.text(act.time,M+7,ay+8);
      doc.setFillColor(...tc.hex); doc.roundedRect(M+23,ay+3,20,6,1.5,1.5,"F");
      doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(6.5); doc.text(tc.label.toUpperCase(),M+33,ay+7.5,{align:"center"});
      doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.text(doc.splitTextToSize(act.title,CW-48)[0],M+47,ay+8);
      if(act.note){ doc.setTextColor(130,130,155); doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.text(doc.splitTextToSize(act.note,CW-50)[0],M+7,ay+16); }
      // Photo count badge — no emoji (renders as garbage in jsPDF)
      if(hasPhotos){
        doc.setTextColor(...tc.hex); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
        doc.text(images.length+" foto"+(images.length!==1?"s":""),W-M,ay+8,{align:"right"});
      }
      ay+=bh+3;

      // Photos grid — 2 per row, large size
      const b64imgs=images.filter(img=>img.startsWith("data:"));
      if(b64imgs.length>0){
        const perRow=2;
        const imgW=(CW-6)/perRow;   // ~84mm each — full width split in 2
        const imgH=imgW*0.65;        // 4:3 aspect ratio (~55mm tall)
        const gap=6;
        const rows=Math.ceil(b64imgs.length/perRow);
        const totalImgH=rows*(imgH+gap)+12;

        if(ay+totalImgH>H-18){
          doc.addPage();
          doc.setFillColor(...rgb); doc.rect(0,0,W,16,"F");
          doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
          doc.text("DIA "+(dayIdx+1)+" - fotos de "+act.title,M,11);
          ay=24;
        }

        doc.setTextColor(130,130,155); doc.setFont("helvetica","italic"); doc.setFontSize(7.5);
        doc.text("Fotos: "+act.title, M, ay+4); ay+=8;

        b64imgs.forEach((img,i)=>{
          const col=i%perRow;
          const row=Math.floor(i/perRow);
          const x=M+col*(imgW+gap);
          const y=ay+row*(imgH+gap);
          try {
            const fmt=img.startsWith("data:image/png")?"PNG":img.startsWith("data:image/webp")?"WEBP":"JPEG";
            doc.addImage(img,fmt,x,y,imgW,imgH,undefined,"FAST");
            doc.setDrawColor(...tc.hex); doc.setLineWidth(0.4);
            doc.roundedRect(x,y,imgW,imgH,3,3,"S");
          } catch(e){
            doc.setFillColor(230,231,240); doc.roundedRect(x,y,imgW,imgH,3,3,"F");
            doc.setTextColor(160,160,180); doc.setFontSize(8); doc.text("foto",x+imgW/2,y+imgH/2,{align:"center"});
          }
        });
        ay+=rows*(imgH+gap)+6;
      }
    });
    doc.setTextColor(185,185,205); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    doc.text(trip.title+"  ·  Dia "+(dayIdx+1)+" de "+trip.days.length,W/2,H-10,{align:"center"});
    doc.setDrawColor(...rgb); doc.setLineWidth(0.8); doc.line(M,H-6,W-M,H-6);
  });

  doc.save(trip.title.replace(/\s+/g,"-").toLowerCase()+"-itinerario.pdf");
}

// ─── EXPENSES DASHBOARD PDF ───────────────────────────────────────────────────
async function generateExpensesPDF(trip) {
  const JsPDF = await loadJsPDF();
  const doc   = new JsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, H=297, M=16, CW=178;
  const rgb   = hexRgb(trip.color);
  const exps  = trip.expenses||[];
  const mems  = trip.members||[];
  const cur   = exps[0]?.currency||"EUR";
  const total = exps.reduce((a,e)=>a+e.amount,0);
  const bal   = calcBalances(mems, exps);

  // helper: section header
  const sectionHeader = (label, y) => {
    doc.setFillColor(...rgb); doc.roundedRect(M,y,CW,8,2,2,"F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8);
    doc.text(label.toUpperCase(), M+6, y+5.5);
    return y+13;
  };

  // helper: horizontal bar chart (value 0-max, width available)
  const barChart = (value, max, barW, color, y, x) => {
    const fill = max>0 ? Math.max(2, (value/max)*barW) : 0;
    doc.setFillColor(230,231,240); doc.roundedRect(x,y,barW,4,2,2,"F");
    doc.setFillColor(...hexRgb(color)); doc.roundedRect(x,y,fill,4,2,2,"F");
  };

  // ── PAGE 1: COVER DASHBOARD ────────────────────────────────────────────────
  // Full header strip
  doc.setFillColor(...rgb); doc.rect(0,0,W,52,"F");
  // Decorative circles
  doc.setDrawColor(255,255,255); doc.setLineWidth(0.3);
  doc.circle(W-22,14,28,"S"); doc.circle(W-22,14,18,"S");

  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(9);
  doc.text("INFORME DE GASTOS", M, 14);
  doc.setFontSize(22); doc.text(trip.title, M, 28);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text(trip.destination+"   ·   "+fmt(trip.startDate)+" → "+fmt(trip.endDate), M, 38);
  doc.text("Generado el "+new Date().toLocaleDateString("es-ES"), M, 47);

  // ── KPI CARDS row ──
  const kpis = [
    { label:"Total gastado",  value:money(total,cur),         color:trip.color },
    { label:"Gastos",         value:String(exps.length),      color:"#60A5FA"  },
    { label:"Personas",       value:String(mems.length),      color:"#A78BFA"  },
    { label:"Media/persona",  value:mems.length?money(total/mems.length,cur):"—", color:"#34D399" },
  ];
  const kw=(CW-9)/4;
  kpis.forEach((k,i)=>{
    const kx=M+i*(kw+3);
    doc.setFillColor(245,246,252); doc.roundedRect(kx,58,kw,22,3,3,"F");
    doc.setFillColor(...hexRgb(k.color)); doc.roundedRect(kx,58,kw,3,1.5,1.5,"F");
    doc.setTextColor(...hexRgb(k.color)); doc.setFont("helvetica","bold"); doc.setFontSize(i===0||i===3?10:14);
    doc.text(k.value, kx+kw/2, 70, {align:"center"});
    doc.setTextColor(120,120,145); doc.setFont("helvetica","normal"); doc.setFontSize(6.5);
    doc.text(k.label.toUpperCase(), kx+kw/2, 76, {align:"center"});
  });

  // ── SECTION 1: GASTO POR CATEGORÍA ────────────────────────────────────────
  let y = sectionHeader("Gasto por categoría", 88);
  const byCat={};
  exps.forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
  const catEntries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxCat=catEntries[0]?.[1]||1;

  catEntries.forEach(([cat,amt],i)=>{
    const ec=EXP_CATS[cat]||EXP_CATS.otro;
    const pct=total>0?Math.round(amt/total*100):0;
    const row = i%2===0;
    if(row){ doc.setFillColor(248,249,253); doc.roundedRect(M,y-3,CW,12,1.5,1.5,"F"); }
    // emoji label
    doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(ec.label, M+5, y+4);
    // bar
    barChart(amt, maxCat, 70, ec.color, y+1, M+35);
    // pct
    doc.setTextColor(110,110,140); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    doc.text(pct+"%", M+108, y+5);
    // amount
    doc.setTextColor(...hexRgb(ec.color)); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(money(amt,cur), W-M, y+5, {align:"right"});
    y+=12;
  });
  y+=4;

  // ── SECTION 2: GASTO POR PERSONA ──────────────────────────────────────────
  y = sectionHeader("Gasto por persona", y);
  // Use calcBalances for correct per-person amounts (respects custom splits)
  const maxMem=Math.max(...mems.map(m=>bal.owes[m.id]||0),1);

  mems.forEach((m,i)=>{
    const amt=bal.owes[m.id]||0;
    const pct=total>0?Math.round(amt/total*100):0;
    const paidAmt=bal.paid[m.id]||0;
    if(i%2===0){ doc.setFillColor(248,249,253); doc.roundedRect(M,y-3,CW,12,1.5,1.5,"F"); }
    doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(m.name, M+5, y+4);
    barChart(amt, maxMem, 62, trip.color, y+1, M+38);
    doc.setTextColor(110,110,140); doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
    doc.text("Pagado: "+money(paidAmt,cur)+"  ·  Gastado: "+money(amt,cur), M+103, y+5);
    doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    const net=bal.net[m.id]||0;
    doc.setTextColor(...hexRgb(Math.abs(net)<0.01?"#A7A9BE":net>0?"#4ADE80":"#F87171"));
    doc.text((net>=0?"+":"")+money(net,cur), W-M, y+5, {align:"right"});
    y+=12;
  });
  y+=4;

  // ── SECTION 3: BALANCE & LIQUIDACIONES ────────────────────────────────────
  if(y+60 > H-20){ doc.addPage(); y=20; }
  y = sectionHeader("Balance individual", y);

  const colW=(CW-4)/mems.length;
  mems.forEach((m,i)=>{
    const n=bal.net[m.id]||0;
    const isPos=n>=0.01, isNeg=n<=-0.01;
    const cx=M+i*(colW+4/(mems.length));
    const cardH=34;
    // card bg
    doc.setFillColor(isPos?232:isNeg?254:245, isPos?249:isNeg?232:246, isPos?240:isNeg?232:252);
    doc.roundedRect(cx,y,colW,cardH,3,3,"F");
    doc.setFillColor(...hexRgb(isPos?"#4ADE80":isNeg?"#F87171":"#A7A9BE"));
    doc.roundedRect(cx,y,colW,3,1.5,1.5,"F");
    // name
    doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(8.5);
    doc.text(m.name, cx+colW/2, y+11, {align:"center"});
    // net amount
    const col=isPos?"#4ADE80":isNeg?"#F87171":"#A7A9BE";
    doc.setTextColor(...hexRgb(col)); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text((n>=0?"+":"")+money(Math.abs(n),cur), cx+colW/2, y+20, {align:"center"});
    // status label
    doc.setFontSize(6.5); doc.setFont("helvetica","normal");
    doc.text(isPos?"Le deben":isNeg?"Debe":"OK", cx+colW/2, y+28, {align:"center"});
  });
  y+=38;

  // Liquidaciones
  if(bal.settlements.length>0){
    y+=2;
    doc.setTextColor(...rgb); doc.setFont("helvetica","bold"); doc.setFontSize(8);
    doc.text("LIQUIDACIONES SUGERIDAS", M, y); y+=6;
    doc.setDrawColor(...rgb); doc.setLineWidth(0.4); doc.line(M,y,M+70,y); y+=6;
    bal.settlements.forEach((s,i)=>{
      const fm=mems.find(m=>m.id===s.from), tm=mems.find(m=>m.id===s.to);
      if(!fm||!tm)return;
      if(i%2===0){ doc.setFillColor(248,249,253); doc.roundedRect(M,y-2,CW,11,1.5,1.5,"F"); }
      doc.setTextColor(28,28,48); doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
      doc.text(fm.name, M+5, y+5);
      doc.setTextColor(160,160,185); doc.setFont("helvetica","normal"); doc.setFontSize(9);
      doc.text("→", M+5+doc.getTextWidth(fm.name)+3, y+5);
      doc.setTextColor(28,28,48); doc.setFont("helvetica","bold"); doc.setFontSize(9.5);
      doc.text(tm.name, M+5+doc.getTextWidth(fm.name)+10, y+5);
      doc.setTextColor(52,199,89); doc.setFont("helvetica","bold"); doc.setFontSize(10);
      doc.text(money(s.amount,cur), W-M, y+5, {align:"right"});
      y+=12;
    });
  } else {
    doc.setFillColor(220,252,231); doc.roundedRect(M,y,CW,14,3,3,"F");

// ─── localStorage persistence helpers ────────────────────────────────────────
const STORAGE_KEY = "mis-viajes-data-v1";

function loadTrips() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) { console.warn("Error loading trips:", e); }
  return SAMPLE_TRIPS;
}

function saveTrips(trips) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trips)); }
  catch(e) { console.warn("Error saving trips:", e); }
}

    dPdf:   l=>({marginTop:14,padding:"10px 18px",borderRadius:12,border:"none",background:l?"rgba(0,0,0,0.2)":"rgba(255,255,255,0.2)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6}),

    secTabs:{display:"flex",background:"#13121F",borderBottom:"1px solid #1C1B29"},

    tabWrap:{background:"#13121F",overflowX:"auto",borderBottom:"1px solid #1C1B29"},
    tabs:   {display:"flex",padding:"12px 16px",gap:8,minWidth:"max-content"},
    tab:    a=>({padding:"8px 16px",borderRadius:12,cursor:"pointer",border:"none",background:a?"#FF6B6B":"#1C1B29",color:a?"#fff":"#A7A9BE",fontSize:13,fontWeight:a?700:500,whiteSpace:"nowrap"}),
    subTabs:{display:"flex",gap:8,padding:"16px 20px 0"},
    subTab: a=>({padding:"7px 16px",borderRadius:20,cursor:"pointer",border:"none",background:a?"#FF6B6B22":"#1C1B29",color:a?"#FF6B6B":"#A7A9BE",fontSize:13,fontWeight:a?700:500,border:a?"1.5px solid #FF6B6B44":"1.5px solid transparent"}),

    aList:  {padding:"16px 20px 100px",display:"flex",flexDirection:"column",gap:1},
    aItem:  {display:"flex",alignItems:"flex-start",gap:14,padding:"16px 0",borderBottom:"1px solid #1C1B29"},
    aTime:  {fontSize:12,fontWeight:700,color:"#A7A9BE",minWidth:44,marginTop:2},
    aDot:   c=>({width:36,height:36,borderRadius:10,background:c+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}),
    aCont:  {flex:1},
    aTitle: {fontSize:15,fontWeight:600,color:"#FFFFFE",lineHeight:1.3},
    aNote:  {fontSize:12,color:"#A7A9BE",marginTop:3},
    aBtn:   {background:"none",border:"none",color:"#A7A9BE",fontSize:18,cursor:"pointer",padding:"0 4px"},
    fab:    {position:"fixed",bottom:32,right:"calc(50% - 215px + 24px)",width:56,height:56,borderRadius:18,background:"#FF6B6B",border:"none",color:"#fff",fontSize:28,cursor:"pointer",boxShadow:"0 8px 24px rgba(255,107,107,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},
    tg:     {display:"flex",flexWrap:"wrap",gap:8},
    to:     (s,c)=>({padding:"8px 14px",borderRadius:12,cursor:"pointer",background:s?c+"33":"#1C1B29",color:s?c:"#A7A9BE",fontSize:13,fontWeight:s?700:500,border:s?`1.5px solid ${c}`:"1.5px solid transparent"}),
    noItems:{textAlign:"center",padding:"48px 20px",color:"#A7A9BE",fontSize:14,lineHeight:1.8},
    // accommodations
    accList:{padding:"16px 20px 100px",display:"flex",flexDirection:"column",gap:12},
    accCard:{borderRadius:18,background:"#1C1B29",border:"1px solid #2D2C3E",overflow:"hidden"},
    accTop: {padding:"16px 16px 12px",display:"flex",gap:12,alignItems:"flex-start"},
    accIcon:{width:44,height:44,borderRadius:12,background:"#A78BFA22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0},
    accBody:{flex:1,minWidth:0},
    accBtns:{display:"flex",borderTop:"1px solid #2D2C3E"},
    accBtn: c=>({flex:1,padding:"11px 0",border:"none",background:"transparent",color:c||"#A7A9BE",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}),
    accBtnD:{flex:1,padding:"11px 0",border:"none",background:"transparent",color:"#A7A9BE",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,borderLeft:"1px solid #2D2C3E"},
    starRow:{display:"flex",gap:8},
    starBtn:(n,a)=>({fontSize:24,cursor:"pointer",background:"none",border:"none",color:a?"#FBBF24":"#2D2C3E",padding:"0 2px",lineHeight:1}),
    spinner:{display:"inline-block",width:13,height:13,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"currentColor",borderRadius:"50%",animation:"spin 0.7s linear infinite"},
    // expense styles
    expList:{padding:"0 20px 100px",display:"flex",flexDirection:"column",gap:10},
    expCard:{borderRadius:16,background:"#1C1B29",border:"1px solid #2D2C3E",overflow:"hidden"},
    expTop: {padding:"14px 16px 10px",display:"flex",gap:12,alignItems:"flex-start"},
    expIcon:c=>({width:40,height:40,borderRadius:11,background:c+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}),
    expBody:{flex:1,minWidth:0},
    expBtns:{display:"flex",borderTop:"1px solid #2D2C3E"},
    expBtn: c=>({flex:1,padding:"10px 0",border:"none",background:"transparent",color:c||"#A7A9BE",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}),
    // members
    memRow: {display:"flex",flexWrap:"wrap",gap:8,marginBottom:8},
    memChip:(a)=>({display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,background:a?"#FF6B6B22":"#1C1B29",border:a?"1.5px solid #FF6B6B44":"1.5px solid #2D2C3E",cursor:"pointer",fontSize:13,color:a?"#FF6B6B":"#FFFFFE",fontWeight:a?700:400}),
    // balance
    balCard:{borderRadius:16,background:"#1C1B29",border:"1px solid #2D2C3E",padding:"16px"},
    balRow: {display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #1C1B29"},
    settRow:{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderBottom:"1px solid #1C1B29"},
    badge:  c=>({background:c+"22",color:c,border:`1px solid ${c}33`,borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:700}),
  };

  const expSection = (accs) => {
    const expenses = activeTrip?.expenses||[];
    const members  = activeTrip?.members||[];
    const totalExp = expenses.reduce((a,e)=>a+e.amount,0);
    const currency = expenses[0]?.currency||"EUR";

    return (
      <div>
        {/* summary bar */}
        <div style={{margin:"16px 20px 0",borderRadius:16,background:"linear-gradient(135deg,#1C1B29,#2D2C3E)",border:"1px solid #2D2C3E",padding:"16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,color:"#A7A9BE"}}>Total gastado</div>
              <div style={{fontSize:28,fontWeight:800,color:"#FFFFFE",marginTop:2}}>{money(totalExp,currency)}</div>
              <div style={{fontSize:12,color:"#A7A9BE",marginTop:2}}>{expenses.length} gasto{expenses.length!==1?"s":""}  ·  {members.length} persona{members.length!==1?"s":""}</div>
            </div>
            <div style={{fontSize:48}}>💸</div>
          </div>
          {/* member avatars */}
          {members.length>0&&(
            <div style={{marginTop:12,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {members.map(m=>(
                <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:36,height:36,borderRadius:12,background:"#FF6B6B22",border:"1px solid #FF6B6B33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{m.avatar}</div>
                  <div style={{fontSize:10,color:"#A7A9BE"}}>{m.name}</div>
                </div>
              ))}
              <button onClick={()=>setShowAddMember(v=>!v)} style={{width:36,height:36,borderRadius:12,background:"#1C1B29",border:"1.5px dashed #2D2C3E",color:"#A7A9BE",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          )}
          {/* add member inline */}
          {(showAddMember||members.length===0)&&(
            <div style={{marginTop:12,background:"#13121F",borderRadius:12,padding:"12px"}}>
              <div style={{fontSize:12,color:"#A7A9BE",marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Añadir persona</div>
              {/* Emoji grid */}
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
                {["👨🏻","👩🏻","🧑🏼","👱🏻‍♀️","👨🏻‍🦳","👵🏻","👧🏻","👦🏻","👳🏽‍♀️","🧓🏻","🧑🏾‍🦱","👱🏻‍♂️"].map(av=>(
                  <button key={av} onClick={()=>setNewMemberAvatar(av)} style={{
                    fontSize:28, padding:"6px 8px", borderRadius:12, cursor:"pointer",
                    background: newMemberAvatar===av ? "#FF6B6B22" : "#1C1B29",
                    border: newMemberAvatar===av ? "2px solid #FF6B6B" : "2px solid transparent",
                    transition:"all 0.1s",
                  }}>{av}</button>
                ))}
                {/* Custom emoji button */}
                {(()=>{
                  const isCustom=!["👨🏻","👩🏻","🧑🏼","👱🏻‍♀️","👨🏻‍🦳","👵🏻","👧🏻","👦🏻","👳🏽‍♀️","🧓🏻","🧑🏾‍🦱","👱🏻‍♂️"].includes(newMemberAvatar);
                  return (
                    <div style={{position:"relative"}}>
                      <button
                        onClick={()=>{ const v=prompt("Escribe o pega tu emoji:",""); if(v&&v.trim()) setNewMemberAvatar(v.trim().slice(0,4)); }}
                        style={{
                          fontSize:isCustom?26:18, padding:"6px 8px", borderRadius:12, cursor:"pointer",
                          background: isCustom ? "#FF6B6B22" : "#1C1B29",
                          border: isCustom ? "2px solid #FF6B6B" : "2px dashed #2D2C3E",
                          color: isCustom ? "inherit" : "#A7A9BE",
                          minWidth:44, height:44, display:"flex", alignItems:"center", justifyContent:"center",
                          transition:"all 0.1s",
                        }}
                      >{isCustom ? newMemberAvatar : "+"}</button>
                    </div>
                  );
                })()}
              </div>
              {/* Name + button */}
              <div style={{display:"flex",gap:8}}>
                <input
                  style={{...S.inp,flex:1,padding:"11px 14px",fontSize:15}}
                  placeholder="Nombre..."
                  value={newMemberName}
                  onChange={e=>setNewMemberName(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addMember()}
                />
                <button
                  style={{padding:"11px 18px",borderRadius:12,background:"#FF6B6B",border:"none",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:15,boxShadow:"0 4px 12px rgba(255,107,107,0.3)"}}
                  onClick={addMember}
                >OK</button>
              </div>
            </div>
          )}
        </div>

        {/* Manage members */}
        {members.length>0&&(
          <div style={{margin:"12px 20px 0",display:"flex",gap:8,flexWrap:"wrap"}}>
            {members.map(m=>(
              <div key={m.id} style={{display:"inline-flex",alignItems:"center",gap:6,background:"#1C1B29",border:"1px solid #2D2C3E",borderRadius:20,padding:"5px 10px"}}>
                <span style={{fontSize:16}}>{m.avatar}</span>
                <span style={{fontSize:13,color:"#FFFFFE"}}>{m.name}</span>
                <button onClick={()=>deleteMember(m.id)} style={{background:"none",border:"none",color:"#F87171",fontSize:12,cursor:"pointer",padding:"0 0 0 4px"}}>✕</button>
              </div>
            ))}
          </div>
        )}

        {/* Sub tabs: Lista / Balance */}
        <div style={{...S.subTabs, justifyContent:"space-between", alignItems:"center"}}>
          <div style={{display:"flex",gap:8}}>
            <button style={S.subTab(expSubTab==="lista")} onClick={()=>setExpSubTab("lista")}>📋 Lista</button>
            <button style={S.subTab(expSubTab==="balance")} onClick={()=>setExpSubTab("balance")}>⚖️ Balance</button>
          </div>
          <button
            onClick={()=>handleExpPDF(activeTrip)}
            disabled={expPdfLoad||expenses.length===0}
            style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid #34D39944",background:expenses.length===0?"#1C1B29":"#34D39918",color:expenses.length===0?"#555":"#34D399",fontSize:12,fontWeight:700,cursor:expenses.length===0?"default":"pointer",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}
          >
            {expPdfLoad?<><span style={S.spinner}/> PDF...</>:<>⬇ PDF gastos</>}
          </button>
        </div>

        {/* LIST */}
        {expSubTab==="lista"&&(
          <div style={S.expList}>
            <div style={{height:12}}/>
            {expenses.length===0&&(
              <div style={S.noItems}>Sin gastos aún.<br/><span style={{fontSize:12}}>Toca + para añadir el primer gasto.</span></div>
            )}
            {expenses.map(exp=>{
              const ec=EXP_CATS[exp.category]||EXP_CATS.otro;
              const payer=members.find(m=>m.id===exp.paidBy);
              const share=(exp.amount/(exp.splitWith?.length||1));
              return (
                <div key={exp.id} style={S.expCard}>
                  <div style={S.expTop}>
                    <div style={S.expIcon(ec.color)}>{ec.emoji}</div>
                    <div style={S.expBody}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{fontSize:15,fontWeight:700,color:"#FFFFFE",lineHeight:1.3,flex:1}}>{exp.title}</div>
                        <div style={{fontSize:18,fontWeight:800,color:ec.color,whiteSpace:"nowrap"}}>{money(exp.amount,exp.currency)}</div>
                      </div>
                      <div style={{fontSize:12,color:"#A7A9BE",marginTop:4,display:"flex",gap:8,flexWrap:"wrap"}}>
                        {payer&&<span>💳 {payer.avatar} {payer.name}</span>}
                        <span>👥 {exp.splitWith?.length||0} persona{(exp.splitWith?.length||0)!==1?"s":""}</span>
                      </div>
                      {exp.note&&<div style={{fontSize:11,color:"#A7A9BE",marginTop:3}}>💬 {exp.note}</div>}
                      <div style={{fontSize:11,color:"#A7A9BE",marginTop:3}}>📅 {fmt(exp.date)}</div>
                      {/* Ticket thumbnails */}
                      {(exp.images||[]).length>0&&(
                        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                          {(exp.images||[]).slice(0,4).map((img,i)=>(
                            <div key={i} style={{width:48,height:48,borderRadius:8,overflow:"hidden",border:`1px solid ${ec.color}44`,flexShrink:0}}>
                              <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                            </div>
                          ))}
                          {(exp.images||[]).length>4&&(
                            <div style={{width:48,height:48,borderRadius:8,background:"#2D2C3E",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#A7A9BE",flexShrink:0}}>
                              +{exp.images.length-4}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                  <div style={S.expBtns}>
                    <button style={S.expBtn("#60A5FA")} onClick={()=>openEditExp(exp)}>✏️ Editar</button>
                    <button style={{...S.expBtn("#F87171"),borderLeft:"1px solid #2D2C3E"}} onClick={()=>deleteExp(exp.id)}>🗑 Eliminar</button>
                  </div>
                </div>
              );
            })}
            <div style={{height:20}}/>
          </div>
        )}

        {/* BALANCE */}
        {expSubTab==="balance"&&(
          <div style={{padding:"16px 20px 100px",display:"flex",flexDirection:"column",gap:16}}>
            {members.length===0&&<div style={S.noItems}>Añade personas para ver el balance.</div>}
            {members.length>0&&balanceData&&(()=>{
              const memberExpenses = selectedMember
                ? expenses.filter(e => (e.splitWith||[]).includes(selectedMember.id) || e.paidBy===selectedMember.id)
                : [];

              return (
              <>
                {/* per-person balance */}
                <div style={S.balCard}>
                  <div style={{fontSize:13,fontWeight:700,color:"#A7A9BE",marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Balance por persona</div>
                  <div style={{fontSize:11,color:"#A7A9BE",marginBottom:10}}>Toca una persona para ver sus gastos</div>
                  {members.map(m=>{
                    const n=balanceData.net[m.id]||0;
                    const paid=balanceData.paid[m.id]||0;
                    const owes=balanceData.owes[m.id]||0;
                    const col=Math.abs(n)<0.01?"#A7A9BE":n>0?"#4ADE80":"#F87171";
                    const label=Math.abs(n)<0.01?"Equilibrado":n>0?"Le deben":"Debe";
                    const isSelected=selectedMember?.id===m.id;
                    return (
                      <div key={m.id}>
                        <div
                          onClick={()=>setSelectedMember(isSelected?null:m)}
                          style={{...S.balRow,cursor:"pointer",borderRadius:12,padding:"10px 12px",background:isSelected?"#FF6B6B11":"transparent",border:isSelected?"1px solid #FF6B6B33":"1px solid transparent",transition:"all 0.15s"}}
                        >
                          <div style={{display:"flex",gap:10,alignItems:"center"}}>
                            <div style={{width:38,height:38,borderRadius:11,background:"#FF6B6B22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{m.avatar}</div>
                            <div>
                              <div style={{fontSize:15,fontWeight:700,color:"#FFFFFE"}}>{m.name}</div>
                              <div style={{fontSize:11,color:"#A7A9BE"}}>Pagado {money(paid,currency)}  ·  Gastado {money(owes,currency)}</div>
                            </div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                            <div style={{fontSize:17,fontWeight:800,color:col}}>{n>=0?"+":""}{money(Math.abs(n),currency)}</div>
                            <div style={S.badge(col)}>{label}</div>
                          </div>
                        </div>

                        {/* Expanded: gastos de esta persona */}
                        {isSelected&&(
                          <div style={{marginTop:4,marginBottom:8,borderRadius:12,overflow:"hidden",border:"1px solid #2D2C3E",background:"#13121F",animation:"fadeIn 0.2s ease"}}>
                            <div style={{padding:"10px 14px",borderBottom:"1px solid #2D2C3E",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <div style={{fontSize:12,fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:0.5}}>{m.name} · {memberExpenses.length} gasto{memberExpenses.length!==1?"s":""}</div>
                              <div style={{fontSize:12,color:"#A7A9BE"}}>Total: {money(memberExpenses.reduce((a,e)=>{
                                if(e.paidBy===m.id) return a;
                                if(e.splitMode==="custom") return a+(parseFloat(e.customAmounts?.[m.id])||0);
                                return a+(e.amount/(e.splitWith?.length||1));
                              },0),currency)}</div>
                            </div>
                            {memberExpenses.length===0
                              ? <div style={{padding:"16px",textAlign:"center",color:"#A7A9BE",fontSize:13}}>Sin gastos asignados</div>
                              : memberExpenses.map(exp=>{
                                  const ec=EXP_CATS[exp.category]||EXP_CATS.otro;
                                  const payer=members.find(x=>x.id===exp.paidBy);
                                  const isPayerThis=exp.paidBy===m.id;
                                  let share=0;
                                  if(exp.splitMode==="custom") share=parseFloat(exp.customAmounts?.[m.id])||0;
                                  else if((exp.splitWith||[]).includes(m.id)) share=exp.amount/(exp.splitWith?.length||1);
                                  return (
                                    <div key={exp.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #1C1B29"}}>
                                      <div style={{width:32,height:32,borderRadius:9,background:ec.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{ec.emoji}</div>
                                      <div style={{flex:1,minWidth:0}}>
                                        <div style={{fontSize:13,fontWeight:600,color:"#FFFFFE",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{exp.title}</div>
                                        <div style={{fontSize:11,color:"#A7A9BE",marginTop:2}}>
                                          {isPayerThis
                                            ? <span style={{color:"#4ADE80"}}>💳 Pagó {money(exp.amount,exp.currency)}</span>
                                            : <span>Pagó {payer?.avatar} {payer?.name}</span>
                                          }
                                        </div>
                                      </div>
                                      <div style={{textAlign:"right",flexShrink:0}}>
                                        <div style={{fontSize:13,fontWeight:700,color:isPayerThis?"#4ADE80":ec.color}}>
                                          {isPayerThis?"+":"−"}{money(isPayerThis?exp.amount:share,exp.currency)}
                                        </div>
                                        <div style={{fontSize:10,color:"#A7A9BE"}}>
                                          {isPayerThis?"cobrado":"su parte"}
                                        </div>
                                      </div>
                                    </div>
                                  );
                                })
                            }
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* settlements */}
                <div style={S.balCard}>
                  <div style={{fontSize:13,fontWeight:700,color:"#A7A9BE",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Liquidaciones</div>
                  <div style={{fontSize:12,color:"#A7A9BE",marginBottom:12}}>Transferencias mínimas para saldar las deudas</div>
                  {balanceData.settlements.length===0
                    ? <div style={{textAlign:"center",padding:"24px 0",color:"#4ADE80",fontSize:14,fontWeight:600}}>✅ ¡Todo está equilibrado!</div>
                    : balanceData.settlements.map((s,i)=>{
                        const fm=members.find(m=>m.id===s.from);
                        const tm=members.find(m=>m.id===s.to);
                        if(!fm||!tm)return null;
                        return (
                          <div key={i} style={S.settRow}>
                            <div style={{width:36,height:36,borderRadius:11,background:"#F8717122",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{fm.avatar}</div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:14,fontWeight:700,color:"#FFFFFE"}}>{fm.name} → {tm.name}</div>
                              <div style={{fontSize:12,color:"#A7A9BE",marginTop:1}}>{fm.name} le paga a {tm.name}</div>
                            </div>
                            <div style={{fontSize:16,fontWeight:800,color:"#4ADE80"}}>{money(s.amount,currency)}</div>
                            <div style={{width:36,height:36,borderRadius:11,background:"#4ADE8022",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{tm.avatar}</div>
                          </div>
                        );
                      })
                  }
                </div>

                {/* category breakdown */}
                {expenses.length>0&&(()=>{
                  const byCat={};
                  expenses.forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
                  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
